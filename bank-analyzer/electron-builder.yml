appId: com.bankanalyzer.app
productName: Bank Analyzer
directories:
  output: dist-electron
mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch: [x64, arm64]
win:
  target:
    - target: nsis
    - target: portable
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Bank Analyzer"
  deleteAppDataOnUninstall: false
extraResources:
  - from: python-dist/
    to: python/
    filter: ["**/*"]