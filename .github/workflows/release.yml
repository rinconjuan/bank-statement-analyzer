name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bank-analyzer/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        working-directory: bank-analyzer
        run: npm ci

      - name: Install backend dependencies
        working-directory: bank-analyzer/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Python backend executable
        working-directory: bank-analyzer/python
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm bank-analyzer-backend.spec
          New-Item -ItemType Directory -Force ../python-dist | Out-Null
          Copy-Item ./dist/bank-analyzer-backend/bank-analyzer-backend.exe ../python-dist/ -Force

      - name: Build frontend + Electron main
        working-directory: bank-analyzer
        run: npm run build

      - name: Package Windows app
        working-directory: bank-analyzer
        run: npx electron-builder --win nsis portable --publish never

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: bank-analyzer-win-build
          path: |
            bank-analyzer/dist-electron/*.exe
            bank-analyzer/dist-electron/*.yml
            bank-analyzer/dist-electron/*.blockmap
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bank-analyzer/dist-electron/*.exe
            bank-analyzer/dist-electron/*.yml
            bank-analyzer/dist-electron/*.blockmap
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
